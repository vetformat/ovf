[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ovf_types"
version = "1.3.1"
description = "Python Pydantic v2 models for the Open Vet Format (OVF)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = ["pydantic>=2.0,<3.0"]
keywords = ["ovf", "veterinary", "pydantic", "schema", "fhir", "medical-records"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Healthcare Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
]
authors = [
    { name = "VetFormat", email = "hello@vetformat.org" },
]

[project.urls]
Homepage = "https://vetformat.org"
Repository = "https://github.com/vetformat/ovf"
Documentation = "https://vetformat.org"
Issues = "https://github.com/vetformat/ovf/issues"
Changelog = "https://github.com/vetformat/ovf/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["ovf_types"]
