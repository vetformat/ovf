name: Validate Schemas & Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate schemas & examples
        run: npm run validate

      - name: Run tests
        run: npm test

  generate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install datamodel-code-generator
        run: pip install datamodel-code-generator

      - name: Generate TypeScript types
        run: npm run generate:typescript

      - name: Generate Python models
        run: npm run generate:python

      - name: Verify generated files are up to date
        run: git diff --exit-code packages/
