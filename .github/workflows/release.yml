name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate schemas & examples
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Package schemas
        run: tar -czf ovf-schemas-${{ github.ref_name }}.tar.gz schemas/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ovf-schemas-${{ github.ref_name }}.tar.gz
