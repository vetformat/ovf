name: Bug Report
description: Report a bug in the OVF schemas or validator tooling
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: dropdown
    id: schema_version
    attributes:
      label: Schema Version
      options:
        - v1.2.0
        - v1.1.0
        - v1.0.0
    validations:
      required: true

  - type: textarea
    id: example_document
    attributes:
      label: Example Document
      description: Paste the JSON document that triggers the bug
      render: json

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
